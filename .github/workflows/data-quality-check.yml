name: Data Quality Check (Daily/Weekly/Monthly)

on:
  schedule:
    # Run at 9:00 AM UTC every day to check all temporal granularities
    - cron: '0 9 * * *'

  # Allow manual trigger
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  data-quality-check:
    name: Run Data Quality Check (All Temporal Granularities)
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Prevent runaway jobs

    permissions:
      contents: read
      issues: write  # For creating issues on failures

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up GCP credentials
        run: |
          echo "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}" | base64 -d > /tmp/gcp-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json" >> $GITHUB_ENV

      - name: Run data quality check
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_DATASET: ${{ secrets.GCP_DATASET }}
          GCP_TABLE: ${{ secrets.GCP_TABLE }}
          EMAIL_ENABLED: ${{ secrets.EMAIL_ENABLED }}
          EMAIL_SMTP_HOST: ${{ secrets.EMAIL_SMTP_HOST }}
          EMAIL_SMTP_PORT: ${{ secrets.EMAIL_SMTP_PORT }}
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          LOG_LEVEL: INFO
          LOOKBACK_WEEKS: 8
        run: |
          python3 src/main.py

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: data-quality-report-${{ github.run_number }}
          path: reports/*.md
          retention-days: 30

      - name: Clean up credentials
        if: always()
        run: |
          rm -f /tmp/gcp-key.json

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Data Quality Check Failed (Daily/Weekly/Monthly) - ${new Date().toISOString().split('T')[0]}`,
              body: `The data quality check (all temporal granularities) failed. Check the [workflow logs](${context.payload.repository.html_url}/actions/runs/${context.runId}) for details.`,
              labels: ['bug', 'data-quality', 'automated']
            })

